<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luizianna Faria | Gestão Estratégica para Escolas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts: Inter é a base de tudo agora -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        html { scroll-behavior: smooth; }
        /* Restaurando a Inter como fonte global e para títulos */
        body { font-family: 'Inter', sans-serif; }
        
        /* Estilo específico para headlines de alto impacto */
        .headline-impact {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .selection-red::selection {
            background-color: #dc2626;
            color: white;
        }

        /* Efeito de gradiente no ouro */
        .text-gold {
            color: #d4af37;
        }
    </style>
</head>
<body class="bg-black text-white selection-red">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [activeFaq, setActiveFaq] = useState(null);
            const [scrolled, setScrolled] = useState(false);

            const photoHeroUrl = "https://i.imgur.com/B6gg56C.jpg";
            const photoBioUrl = "https://i.imgur.com/cpgI4Bw.png";

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const credentials = [
                { institution: 'USP', title: 'MBA em Gestão de Negócios', desc: 'Expertise em administração estratégica para instituições de ensino.' },
                { institution: 'ESTRATÉGIA', title: 'Captação de Alunos', desc: 'Especialista em funis de conversão para o setor educacional.' },
                { institution: '+10 ANOS', title: 'Experiência de Mercado', desc: 'Liderando o crescimento de escolas e redes de ensino de alto padrão.' }
            ];

            const pillars = [
                { icon: "target", color: "text-red-600", title: "Filtro de Perfil", desc: "Anúncios que aparecem apenas para famílias com poder aquisitivo compatível com sua mensalidade." },
                { icon: "map-pin", color: "text-gold", title: "Foco Geográfico", desc: "Dominamos as buscas feitas por pais que moram ou trabalham no entorno da sua escola." },
                { icon: "bar-chart-3", color: "text-red-600", title: "Decisão em Dados", desc: "Análise rigorosa do custo por visita agendada. Sem achismos: focamos no que realmente traz matrículas." },
                { icon: "shield-check", color: "text-gold", title: "Gestão de Marca", desc: "Proteção e valorização da imagem institucional. Sua escola posicionada como a melhor escolha da região." }
            ];

            const services = [
                { title: "Tráfego para Captação", subtitle: "Porta de Entrada & Matrículas", icon: "mouse-pointer-click", color: "text-red-600", features: ["Gestão de Google & Meta Ads", "Filtro de Público Qualificado (A/B)", "Setup de Rastreamento de Leads", "Relatórios de ROI Educacional"] },
                { title: "Consultoria Fractional", subtitle: "Liderança Estratégica", icon: "settings-2", color: "text-gold", features: ["Liderança do Time de Marketing", "Treinamento do Comercial da Escola", "Estruturação de Dashboards", "Reuniões Estratégicas Mensais"] },
                { title: "Metodologia de Atração", subtitle: "Presença e Autoridade", icon: "glasses", color: "text-red-600", features: ["Análise de Concorrência Local", "Posicionamento de Diferenciais Acadêmicos", "Identificação de Vazamento de Verba", "Plano de Presença no Bairro"] },
                { title: "Processo Comercial", subtitle: "Conversão em Secretaria", icon: "database", color: "text-gold", features: ["Implementação de CRM Escolar", "Scripts de Vendas para Matrículas", "SLA: Marketing -> Secretaria", "Automação de Réguas de Contato"] }
            ];

            const faqs = [
                { question: "Para quem é indicada a sua consultoria?", answer: "Para donos de escolas e gestores que buscam atrair famílias de alto padrão e não querem desperdiçar verba com agências generalistas." },
                { question: "Vocês fazem apenas os anúncios ou a estratégia?", answer: "Entregamos a gestão completa. O tráfego pago é o motor, mas ele só funciona com uma estratégia de posicionamento e processo comercial." },
                { question: "Como funciona o filtro de poder aquisitivo nos anúncios?", answer: "Utilizamos camadas avançadas de segmentação por comportamento, interesses e localização para atingir famílias que buscam excelência." },
                { question: "O diagnóstico é realmente gratuito?", answer: "Sim. Serve para eu entender se sua instituição tem o perfil necessário para o meu modelo de acompanhamento." }
            ];

            return (
                <div className="min-h-screen">
                    {/* Botão WhatsApp */}
                    <div className="fixed bottom-6 right-6 z-[100] group">
                        <a href="https://wa.me/SEU_NUMERO" target="_blank" className="bg-green-600 text-white p-4 rounded-full shadow-lg hover:scale-110 transition-all flex items-center justify-center">
                            <Icon name="message-circle" size={24} />
                        </a>
                    </div>

                    {/* Navbar */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/95 backdrop-blur-md py-4 border-b border-zinc-800' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-red-600 rounded-sm flex items-center justify-center font-black italic text-white">L</div>
                                <span className="font-black uppercase tracking-tighter text-xl">Luizianna <span className="text-red-600">Faria</span></span>
                            </div>
                            <div className="hidden md:flex items-center gap-8 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400">
                                <a href="#bio" className="hover:text-white transition-colors">A Especialista</a>
                                <a href="#servicos" className="hover:text-white transition-colors">Matrículas</a>
                                <a href="#faq" className="hover:text-white transition-colors">Dúvidas</a>
                                <a href="https://wa.me/SEU_NUMERO" className="bg-white text-black px-6 py-2 rounded-full hover:bg-red-600 hover:text-white transition-all">AGENDAR DIAGNÓSTICO</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="relative min-h-screen flex items-center pt-24 pb-12 px-6 overflow-hidden border-b border-zinc-900">
                        <div className="absolute top-0 right-0 w-full h-full bg-[radial-gradient(circle_at_70%_30%,_rgba(185,28,28,0.1),transparent_50%)]"></div>
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-16 items-center relative z-10">
                            <div className="text-center md:text-left space-y-10 order-2 md:order-1">
                                <div className="inline-flex items-center gap-2 px-5 py-2 rounded-full border border-yellow-600/40 bg-yellow-600/5 text-yellow-500 text-[10px] font-black uppercase tracking-[0.4em]">
                                    <Icon name="shield-check" size={14} />
                                    <span>Estratégia Educacional de Alto Padrão</span>
                                </div>
                                <div className="space-y-6">
                                    <h1 className="headline-impact text-4xl sm:text-5xl md:text-7xl leading-[0.9]">
                                        Sua escola não <br />
                                        <span className="text-red-600">precisa de Cliques.</span> <br />
                                        Precisa de <span className="text-white">Matrículas.</span>
                                    </h1>
                                    <p className="text-zinc-400 text-lg md:text-xl max-w-xl leading-relaxed font-medium">
                                        Estratégias de anúncios desenhadas para atrair famílias que buscam qualidade acadêmica, filtrando o interesse real do simples curioso.
                                    </p>
                                </div>
                                <a href="https://wa.me/SEU_NUMERO" className="inline-block bg-red-600 text-white font-black py-6 px-12 rounded-full hover:bg-red-500 transition-all transform hover:scale-105 shadow-xl uppercase text-sm tracking-[0.2em]">
                                    AGENDAR DIAGNÓSTICO GRATUITO
                                </a>
                            </div>
                            <div className="relative flex justify-center items-center order-1 md:order-2">
                                <div className="relative w-full max-w-[280px] sm:max-w-md aspect-[4/5] bg-zinc-900 rounded-[40px] border border-zinc-800 overflow-hidden shadow-2xl">
                                    <img src={photoHeroUrl} alt="Luizianna Faria" className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                                    <div className="absolute bottom-10 left-10 z-20">
                                        <p className="text-yellow-600 font-black text-xs uppercase tracking-[0.4em] mb-1">MBA Gestão USP</p>
                                        <h3 className="text-2xl md:text-3xl font-black uppercase italic tracking-tighter text-white">Luizianna Faria</h3>
                                    </div>
                                </div>
                                <div className="absolute inset-0 border-2 border-yellow-600/20 rounded-[45px] translate-x-4 translate-y-4 -z-20"></div>
                            </div>
                        </div>
                    </section>

                    {/* Impact Stats */}
                    <section className="py-12 bg-zinc-900/30 border-b border-zinc-800">
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                            <div><p className="headline-impact text-2xl md:text-3xl text-white">+10</p><p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Anos Gerindo Instituições</p></div>
                            <div><p className="headline-impact text-2xl md:text-3xl text-red-600 italic">ROI</p><p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Foco em Aluno Matriculado</p></div>
                            <div><p className="headline-impact text-2xl md:text-3xl text-white">Filtro</p><p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Público Qualificado</p></div>
                            <div><p className="headline-impact text-2xl md:text-3xl text-yellow-600">USP</p><p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Expertise Acadêmica</p></div>
                        </div>
                    </section>

                    {/* Authority */}
                    <section className="py-24 px-6 border-b border-zinc-900">
                        <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-16 items-center">
                            <div>
                                <span className="text-red-600 font-bold uppercase text-xs tracking-[0.3em] mb-4 block underline decoration-red-600/30 underline-offset-8">O Erro Fatal das Escolas</span>
                                <h2 className="headline-impact text-3xl md:text-6xl mb-8 leading-[0.9]">
                                    Tratar sua escola como se fosse uma <span className="text-gold italic">loja comum.</span>
                                </h2>
                                <p className="text-zinc-400 text-lg leading-relaxed border-l-2 border-red-600 pl-8 font-light italic">
                                    Muitas agências entregam volume de "contatos", mas falham na qualificação. Para instituições de elite, cada contato desqualificado é desperdício de recurso.
                                </p>
                            </div>
                            <div className="space-y-4">
                                {credentials.map((item, idx) => (
                                    <div key={idx} className="p-6 bg-zinc-900/40 border border-zinc-800 rounded-xl flex items-center gap-6 group hover:border-red-600 transition-colors">
                                        <div className="w-12 h-12 bg-zinc-800 rounded-lg flex items-center justify-center shrink-0">
                                            <Icon name="award" className="text-yellow-600" />
                                        </div>
                                        <div><h3 className="headline-impact text-lg tracking-tight">{item.institution}</h3><p className="text-red-600 font-bold text-[10px] uppercase">{item.title}</p></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Pillars */}
                    <section className="py-24 px-6 border-b border-zinc-900 bg-zinc-950/20">
                        <div className="max-w-6xl mx-auto grid sm:grid-cols-2 lg:grid-cols-4 gap-12">
                            {pillars.map((item, idx) => (
                                <div key={idx} className="group">
                                    <div className="mb-6"><Icon name={item.icon} className={item.color} size={32} /></div>
                                    <h3 className="headline-impact text-xl mb-4 group-hover:text-yellow-600 transition-colors">{item.title}</h3>
                                    <p className="text-zinc-500 text-sm leading-relaxed border-l border-zinc-900 pl-6 group-hover:border-red-600 transition-all">{item.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Services */}
                    <section id="servicos" className="py-24 px-6 border-b border-zinc-900">
                        <div className="max-w-6xl mx-auto">
                            <h2 className="headline-impact text-3xl md:text-6xl mb-16">Crescimento <span className="text-red-600">Educacional</span></h2>
                            <div className="grid md:grid-cols-2 gap-8">
                                {services.map((service, idx) => (
                                    <div key={idx} className="p-8 md:p-12 bg-zinc-900/20 border border-zinc-800 rounded-3xl hover:border-red-600/50 transition-all group">
                                        <div className="w-14 h-14 bg-zinc-900 rounded-2xl flex items-center justify-center mb-6"><Icon name={service.icon} className={service.color} size={32} /></div>
                                        <span className="text-yellow-600 font-bold text-[10px] uppercase tracking-widest mb-2 block">{service.subtitle}</span>
                                        <h3 className="headline-impact text-2xl md:text-3xl mb-6">{service.title}</h3>
                                        <ul className="space-y-3">
                                            {service.features.map((f, fIdx) => (
                                                <li key={fIdx} className="flex items-center gap-3 text-zinc-400 text-sm"><Icon name="check-circle-2" size={14} className="text-red-600" />{f}</li>
                                            ))}
                                        </ul>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* FAQ */}
                    <section id="faq" className="py-24 px-6 border-b border-zinc-900">
                        <div className="max-w-3xl mx-auto">
                            <h2 className="headline-impact text-3xl md:text-5xl text-center mb-16">Dúvidas <span className="text-red-600">Frequentes</span></h2>
                            <div className="space-y-4">
                                {faqs.map((faq, idx) => (
                                    <div key={idx} className="border border-zinc-800 rounded-2xl overflow-hidden">
                                        <button onClick={() => setActiveFaq(activeFaq === idx ? null : idx)} className="w-full p-6 text-left flex justify-between items-center bg-zinc-900/20 hover:bg-zinc-900/40 transition-colors">
                                            <span className="headline-impact text-sm tracking-widest">{faq.question}</span>
                                            <Icon name={activeFaq === idx ? "minus" : "plus"} size={20} className="text-yellow-600" />
                                        </button>
                                        {activeFaq === idx && <div className="p-6 text-zinc-500 border-t border-zinc-800 bg-black/50 leading-relaxed">{faq.answer}</div>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Footer CTA */}
                    <section className="py-24 px-6 text-center">
                        <div className="max-w-4xl mx-auto p-12 md:p-20 border border-zinc-800 rounded-[40px] bg-zinc-900/40 relative overflow-hidden">
                            <div className="absolute -bottom-20 -left-20 w-80 h-80 bg-red-600/10 blur-[100px] rounded-full"></div>
                            <h2 className="headline-impact text-3xl md:text-6xl mb-8">O ciclo de matrículas <span className="text-red-600 font-normal">não espera.</span></h2>
                            <a href="https://wa.me/SEU_NUMERO" className="inline-block bg-green-600 text-white font-black py-6 px-12 rounded-full hover:bg-green-500 transition-all uppercase text-sm tracking-widest shadow-2xl">SOLICITAR DIAGNÓSTICO AGORA</a>
                        </div>
                    </section>

                    <footer className="py-12 border-t border-zinc-900 text-center">
                        <p className="text-zinc-700 text-[10px] tracking-widest uppercase font-black">© 2026 LUIZIANNA FARIA • ESTRATÉGIA EDUCACIONAL DE ALTO PADRÃO</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
